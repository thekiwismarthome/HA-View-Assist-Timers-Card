<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VATC Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Roboto, sans-serif;
      background: #111827;
      color: #e1e1e1;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── HA CSS variable shims ── */
    :root {
      --primary-text-color: #e1e1e1;
      --secondary-text-color: #9ca3af;
      --primary-color: #03a9f4;
      --divider-color: rgba(255,255,255,0.1);
      --secondary-background-color: rgba(255,255,255,0.05);
      --ha-card-background: #1f2937;
      --card-background-color: #1f2937;
      --ha-card-border-radius: 12px;
      --error-color: #e53935;
      --disabled-text-color: #6b7280;
      --input-fill-color: rgba(255,255,255,0.07);
      --input-ink-color: rgba(255,255,255,0.18);
      --mdc-typography-body1-font-family: Roboto, sans-serif;
    }

    .demo-toolbar {
      display: flex; align-items: center; gap: 12px;
      background: #1f2937; border-radius: 12px;
      padding: 12px 18px; margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .demo-toolbar h1 { font-size: 1em; font-weight: 700; flex: 1; color: #e1e1e1; white-space: nowrap; }
    .demo-toolbar label { font-size: .82em; color: #9ca3af; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .demo-toolbar select, .demo-toolbar input[type=number] {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.18);
      border-radius: 6px; color: #e1e1e1; padding: 5px 8px; font-size: .82em;
      font-family: inherit; outline: none;
    }
    .demo-toolbar input[type=checkbox] { accent-color: #03a9f4; cursor: pointer; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .card-slot { }
    .card-label {
      font-size: .72em; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #6b7280; margin-bottom: 6px;
    }

    /* ── ha-card shim ── */
    ha-card {
      display: block;
      background: var(--ha-card-background, #1f2937);
      border-radius: var(--ha-card-border-radius, 12px);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }

    /* ── ha-icon shim via material symbols ── */
    ha-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: var(--mdc-icon-size, 24px); height: var(--mdc-icon-size, 24px);
      font-size: var(--mdc-icon-size, 24px);
      vertical-align: middle;
    }

    /* ── ha-circular-progress shim ── */
    ha-circular-progress {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--primary-color, #03a9f4);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .theme-light body {
      background: #f3f4f6;
    }
    .theme-light {
      --primary-text-color: #111827;
      --secondary-text-color: #6b7280;
      --divider-color: rgba(0,0,0,.12);
      --secondary-background-color: rgba(0,0,0,.04);
      --ha-card-background: #ffffff;
      --card-background-color: #ffffff;
      --input-fill-color: rgba(0,0,0,.05);
      --input-ink-color: rgba(0,0,0,.2);
    }
  </style>
</head>
<body>

<div class="demo-toolbar">
  <h1>🕐 VATC Demo</h1>

  <label>
    Mode
    <select id="sel-mode">
      <option value="bar">Bar</option>
      <option value="horseshoe">Horseshoe</option>
    </select>
  </label>

  <label>
    Columns
    <input type="number" id="sel-cols" min="1" max="5" value="2" style="width:52px">
  </label>

  <label>
    <input type="checkbox" id="chk-add" checked> Add button
  </label>

  <label>
    <input type="checkbox" id="chk-popup" checked> Ringing popup
  </label>

  <label>
    <input type="checkbox" id="chk-hide"> Hide when empty
  </label>

  <label>
    <input type="checkbox" id="chk-theme"> Light theme
  </label>

  <label>
    Scenario
    <select id="sel-scenario">
      <option value="mixed">Mixed (all types)</option>
      <option value="ringing">Alarm ringing</option>
      <option value="horseshoe-demo">Horseshoe demo</option>
      <option value="empty">Empty</option>
      <option value="localonly">Local only</option>
    </select>
  </label>
</div>

<div class="cards-grid" id="cards"></div>

<script>
// ── ha-icon shim using SVG icon map ──────────────────────────────────────────
const ICONS = {
  'mdi:timer-outline':       'M12 20a8 8 0 0 0 8-8 8 8 0 0 0-8-8 8 8 0 0 0-8 8 8 8 0 0 0 8 8m0-18a10 10 0 0 1 10 10 10 10 0 0 1-10 10C6.47 22 2 17.5 2 12A10 10 0 0 1 12 2m.5 5v5.25l4.5 2.67-.75 1.23L11 13V7h1.5z',
  'mdi:alarm':               'M12 20a7 7 0 0 0 7-7 7 7 0 0 0-7-7 7 7 0 0 0-7 7 7 7 0 0 0 7 7m0-16a9 9 0 0 1 9 9 9 9 0 0 1-9 9A9 9 0 0 1 3 13a9 9 0 0 1 9-9m.5 4v5l3.6 2.1-.7 1.2L11 14V8h1.5M7.88 3.39L6.6 1.86 2 5.71l1.29 1.53 4.59-3.85M22 5.72l-4.6-3.86-1.29 1.53 4.6 3.86L22 5.72z',
  'mdi:reminder':            'M10 21h4c0 1.1-.9 2-2 2s-2-.9-2-2m11-2v1H3v-1l2-2V9c0-3.5 2.5-6.4 6-6.9V1h2v1.1c3.5.5 6 3.4 6 6.9v8l2 2zm-4-9h-4v2h4v-2zm0-4h-4v2h4V6z',
  'mdi:timer-sand':          'M6 2v6l2 2-2 2v6h12v-6l-2-2 2-2V2H6zm10 14.5V20H8v-3.5l4-4 4 4zM12 11l-4-4V4h8v3l-4 4z',
  'mdi:bell-ring-outline':   'M10.57 1.14l1.28 2.12A7.001 7.001 0 0 0 5 10v3H3v2h18v-2h-2v-3a7 7 0 0 0-6.85-6.74l1.28-2.12-1.72-1-1.14 1.86V4l-1.5-.86.5 2zm1.43 19.86a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2z',
  'mdi:close':               'M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z',
  'mdi:plus-circle-outline': 'M12 20a8 8 0 0 1-8-8 8 8 0 0 1 8-8 8 8 0 0 1 8 8 8 8 0 0 1-8 8m0-18A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2m1 5h-2v4H7v2h4v4h2v-4h4v-2h-4V7z',
  'mdi:check-circle-outline': 'M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2m0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8m4.59-12.42L10 14.17l-2.59-2.58L6 13l4 4 8-8-1.41-1.42z',
  'mdi:alert-circle-outline': 'M11 15h2v2h-2v-2m0-8h2v6h-2V7m1-5C6.47 2 2 6.5 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2m0 18a8 8 0 0 1-8-8 8 8 0 0 1 8-8 8 8 0 0 1 8 8 8 8 0 0 1-8 8z',
  'mdi:pause':               'M14 19V5h4v14h-4zM6 19V5h4v14H6z',
  'mdi:play':                'M8 5v14l11-7L8 5z',
};

customElements.define('ha-icon', class extends HTMLElement {
  static get observedAttributes() { return ['icon']; }
  connectedCallback() { this._render(); }
  attributeChangedCallback() { this._render(); }
  _render() {
    const icon = this.getAttribute('icon') || '';
    const d = ICONS[icon];
    const size = getComputedStyle(this).getPropertyValue('--mdc-icon-size').trim() || '24px';
    if (d) {
      this.innerHTML = `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="currentColor"><path d="${d}"/></svg>`;
    } else {
      this.innerHTML = `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>`;
    }
  }
});

customElements.define('ha-card', class extends HTMLElement {
  connectedCallback() { this.style.display = 'block'; }
});

customElements.define('ha-circular-progress', class extends HTMLElement {
  connectedCallback() {
    this.style.cssText = 'display:inline-block;width:24px;height:24px;border:3px solid rgba(255,255,255,.15);border-top-color:#03a9f4;border-radius:50%;animation:spin .8s linear infinite';
  }
});
</script>

<script src="view-assist-timers-card.js"></script>

<script>
// ── Mock hass object ─────────────────────────────────────────────────────────

const now = Date.now();

const SCENARIOS = {
  mixed: [
    { id: 'a1', timer_class: 'timer',    name: 'Pasta',         status: 'active',  seconds_remaining: 542,  duration: 600 },
    { id: 'a2', timer_class: 'timer',    name: 'Sauce',         status: 'active',  seconds_remaining: 1820, duration: 1800 },
    { id: 'a3', timer_class: 'alarm',    name: 'Morning alarm', status: 'active',  seconds_remaining: 3600, duration: 7200 },
    { id: 'a4', timer_class: 'reminder', name: 'Take meds',     status: 'active',  seconds_remaining: 900,  duration: 900  },
  ],
  ringing: [
    { id: 'b1', timer_class: 'alarm', name: 'Wake up',    status: 'expired', seconds_remaining: 0, duration: 3600 },
    { id: 'b2', timer_class: 'alarm', name: 'School run', status: 'expired', seconds_remaining: 0, duration: 1800 },
  ],
  'horseshoe-demo': [
    { id: 'c1', timer_class: 'timer',    name: 'Eggs',       status: 'active',  seconds_remaining: 300,  duration: 600  },
    { id: 'c2', timer_class: 'timer',    name: 'Toast',      status: 'active',  seconds_remaining: 60,   duration: 120  },
    { id: 'c3', timer_class: 'alarm',    name: 'Meeting',    status: 'active',  seconds_remaining: 7200, duration: 14400 },
    { id: 'c4', timer_class: 'reminder', name: 'Gym',        status: 'active',  seconds_remaining: 1800, duration: 3600 },
    { id: 'c5', timer_class: 'timer',    name: 'Bread',      status: 'active',  seconds_remaining: 2700, duration: 3600 },
    { id: 'c6', timer_class: 'alarm',    name: 'Dentist',    status: 'expired', seconds_remaining: 0,    duration: 7200 },
  ],
  empty: [],
  localonly: [],
};

function makeHass(timers) {
  return {
    states: {
      'sensor.vaca_office_tablet': {
        attributes: { friendly_name: 'Office Tablet', type: 'vaca' }
      }
    },
    callWS(msg) {
      if (msg.service === 'get_timers') {
        return Promise.resolve({ response: { result: timers } });
      }
      return Promise.resolve({});
    },
    callService(domain, service, data) {
      console.log(`[mock] ${domain}.${service}`, data);
      return Promise.resolve();
    }
  };
}

// ── Build cards ───────────────────────────────────────────────────────────────

let cards = [];

function getConfig() {
  return {
    title: 'Timers, Alarms & Reminders',
    display_mode: document.getElementById('sel-mode').value,
    columns: parseInt(document.getElementById('sel-cols').value) || 2,
    show_add_button: document.getElementById('chk-add').checked,
    show_ringing_popup: document.getElementById('chk-popup').checked,
    hide_when_empty: document.getElementById('chk-hide').checked,
    show_types: ['timer', 'alarm', 'reminder'],
    snooze_options: [5, 10],
    refresh_interval: 999999,
    va_entity_ids: ['sensor.vaca_office_tablet'],
  };
}

function buildCards() {
  // destroy old cards
  cards.forEach(c => { try { c.disconnectedCallback(); } catch(e){} });
  cards = [];
  document.getElementById('cards').innerHTML = '';

  const scenario = document.getElementById('sel-scenario').value;
  const timers   = SCENARIOS[scenario] || [];
  const hass     = makeHass(timers);
  const config   = getConfig();

  const slot = document.createElement('div');
  slot.className = 'card-slot';
  const lbl = document.createElement('div');
  lbl.className = 'card-label';
  lbl.textContent = scenario + ' — ' + config.display_mode;
  slot.appendChild(lbl);

  const card = document.createElement('view-assist-timers-card');
  card.setConfig(config);
  card.hass = hass;
  slot.appendChild(card);
  document.getElementById('cards').appendChild(slot);
  cards.push(card);

  // If localonly, add some local timers directly
  if (scenario === 'localonly') {
    const pastMs = Date.now() - 5000;
    const localData = [
      { id: 'local-1', timer_class: 'local', name: 'Boiled eggs',  status: 'active', duration_ms: 600000, end_ts: Date.now() + 412000, paused_remaining_ms: null },
      { id: 'local-2', timer_class: 'local', name: 'Bread dough',  status: 'paused', duration_ms: 3600000, end_ts: null, paused_remaining_ms: 1800000 },
      { id: 'local-3', timer_class: 'local', name: 'Pizza timer',  status: 'expired', duration_ms: 900000, end_ts: pastMs, paused_remaining_ms: null },
    ];
    card._localTimers = localData;
    card._injectLocalFinishTimes();
    card._render();
  }
}

// ── Controls ──────────────────────────────────────────────────────────────────

['sel-mode','sel-cols','sel-scenario'].forEach(id => {
  document.getElementById(id).addEventListener('change', buildCards);
});
['chk-add','chk-popup','chk-hide'].forEach(id => {
  document.getElementById(id).addEventListener('change', buildCards);
});

document.getElementById('chk-theme').addEventListener('change', e => {
  document.documentElement.classList.toggle('theme-light', e.target.checked);
  document.body.style.background = e.target.checked ? '#f3f4f6' : '#111827';
});

// ── Init ──────────────────────────────────────────────────────────────────────
buildCards();
</script>
</body>
</html>
